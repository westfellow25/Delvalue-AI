version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=sqlite:///data/delvalue.db
    volumes:
      - ../data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=sqlite:///data/delvalue.db
    volumes:
      - ../data:/app/data
    restart: unless-stopped
    depends_on:
      - api
